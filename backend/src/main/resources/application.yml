server:
  port: 8080

spring:
  application:
    name: mortgage-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mortgage_calculator?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: mortgage_app
    password: Mortgage@2024#App

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.mortgage.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.mortgage: debug
    com.mortgage.mapper: debug